<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>positioning in css</title>
</head>
<style>
   div {
    right: 30px;
    border: 3px solid rgb(78, 16, 135);
   }
   div.absolute {
    position: absolute;
    left: 50px;
    border: 3px solid rgb(29, 85, 29);
   }
   div.relative {
    position: relative;
    left: 100px;
    border: 3px solid rgb(106, 79, 46);
   }
   div.fixed {
    position: fixed;
    top: 0;
    right: 20px;
    left: 300px;
    width: 100px;
    border: 3px solid rgb(94, 34, 34);
   }
   div.sticky {
    position: sticky;
    top: 1px;
    left: 20px;
    width: 100px;
    border: 3px solid rgb(49, 35, 68);
   }
</style>
<body>
    <h2>POSITIONING</h2>
    <div>
        Div with no position property
    </div>
    <div class="sticky">
        Div with sticky position property
    </div>
    <div class="relative">
        This div element has position: relative
    </div>
    <div class="absolute">
        Absolute class DIV
    </div>
    <div>
        <div class="fixed">
            Div with fixed position property
        </div>
    </div>

</body>
</html>
